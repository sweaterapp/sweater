<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sweater Email Confirmed</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-top: #191d22;
      --bg-bottom: #262d36;
      --panel: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.12);
      --text: #f5f7fa;
      --muted: rgba(245, 247, 250, 0.72);
      --accent: #d86a4d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      background: linear-gradient(135deg, var(--bg-top), var(--bg-bottom));
      color: var(--text);
    }

    .card {
      width: min(100%, 420px);
      padding: 28px;
      border-radius: 28px;
      background: var(--panel);
      border: 1px solid var(--border);
      backdrop-filter: blur(16px);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.24);
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 0 0 10px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 32px;
      line-height: 1.05;
    }

    p {
      margin: 0 0 12px;
      color: var(--muted);
      line-height: 1.55;
    }

  </style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">Sweater</p>
    <h1>Email confirmed</h1>
    <p>Your account is verified.</p>
    <p>Go back to Sweater and sign in with your email and password.</p>
  </main>
</body>
</html>
