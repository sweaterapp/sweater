<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Your Sweater Password</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-top: #191d22;
      --bg-bottom: #262d36;
      --panel: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.12);
      --text: #f5f7fa;
      --muted: rgba(245, 247, 250, 0.72);
      --accent: #d86a4d;
      --accent-strong: #ef5a29;
      --success: #3ccf91;
      --error: #ff8d7b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      background: linear-gradient(135deg, var(--bg-top), var(--bg-bottom));
      color: var(--text);
    }

    .card {
      width: min(100%, 440px);
      padding: 28px;
      border-radius: 28px;
      background: var(--panel);
      border: 1px solid var(--border);
      backdrop-filter: blur(16px);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.24);
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 0 0 10px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 30px;
      line-height: 1.05;
    }

    p {
      margin: 0 0 12px;
      color: var(--muted);
      line-height: 1.55;
    }

    .stack {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font: inherit;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    .button {
      appearance: none;
      border: 0;
      border-radius: 14px;
      background: var(--accent-strong);
      color: white;
      padding: 12px 18px;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .button.secondary {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .status {
      margin-top: 14px;
      min-height: 22px;
      font-size: 14px;
      color: var(--muted);
    }

    .status.success {
      color: var(--success);
    }

    .status.error {
      color: var(--error);
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">Sweater</p>
    <h1>Reset your password</h1>
    <p>Set a new password below for your Sweater account.</p>

    <div class="stack">
      <label class="field">
        <span class="label">New password</span>
        <input id="password" type="password" autocomplete="new-password" />
      </label>

      <label class="field">
        <span class="label">Confirm password</span>
        <input id="password-confirm" type="password" autocomplete="new-password" />
      </label>
    </div>

    <div class="actions">
      <button id="update-password" class="button" type="button">Update password</button>
      <a id="open-app" class="button secondary" href="#">Open Sweater</a>
    </div>

    <p id="status" class="status"></p>
  </main>

  <script>
    const hash = window.location.hash.startsWith("#") ? window.location.hash.slice(1) : "";
    const params = new URLSearchParams(hash);
    const accessToken = params.get("access_token") || "";
    const projectUrl = "https://qsaetdyyuugfzfgxagyl.supabase.co";
    const anonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFzYWV0ZHl5dXVnZnpmZ3hhZ3lsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4ODM1NjMsImV4cCI6MjA4OTQ1OTU2M30.IxoWmX05KJyjPM7ecArwSgxFdSxhu3lvTRIfVEe6qbM";
    const appLink = hash ? `sweater://auth#${hash}` : "sweater://auth";

    document.getElementById("open-app").href = appLink;

    const status = document.getElementById("status");

    function showStatus(text, tone = "") {
      status.textContent = text;
      status.className = `status ${tone}`.trim();
    }

    document.getElementById("update-password").addEventListener("click", async () => {
      const password = document.getElementById("password").value;
      const passwordConfirm = document.getElementById("password-confirm").value;

      if (!accessToken) {
        showStatus("This reset link is missing the access token. Request a new password reset email.", "error");
        return;
      }

      if (!password || !passwordConfirm) {
        showStatus("Enter your new password in both fields.", "error");
        return;
      }

      if (password !== passwordConfirm) {
        showStatus("Passwords need to match.", "error");
        return;
      }

      showStatus("Updating password...");

      try {
        const response = await fetch(`${projectUrl}/auth/v1/user`, {
          method: "PUT",
          headers: {
            "apikey": anonKey,
            "Authorization": `Bearer ${accessToken}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ password })
        });

        if (!response.ok) {
          const payload = await response.json().catch(() => ({}));
          const message =
            payload.msg ||
            payload.message ||
            payload.error_description ||
            payload.error ||
            "Password update failed.";
          throw new Error(message);
        }

        showStatus("Password updated. You can now sign in with your new password.", "success");
        document.getElementById("password").value = "";
        document.getElementById("password-confirm").value = "";
      } catch (error) {
        showStatus(error instanceof Error ? error.message : "Password update failed.", "error");
      }
    });
  </script>
</body>
</html>
