<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open Sweater</title>
  <meta
    name="description"
    content="Finish signing in to Sweater and return safely to the app."
  />
  <style>
    :root {
      color-scheme: dark;
      --bg-top: #191d22;
      --bg-bottom: #262d36;
      --panel: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.12);
      --text: #f5f7fa;
      --muted: rgba(245, 247, 250, 0.72);
      --accent: #d86a4d;
      --accent-soft: rgba(216, 106, 77, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      background: linear-gradient(135deg, var(--bg-top), var(--bg-bottom));
      color: var(--text);
    }

    .card {
      width: min(100%, 460px);
      padding: 30px;
      border-radius: 28px;
      background: var(--panel);
      border: 1px solid var(--border);
      backdrop-filter: blur(16px);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.24);
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 0 0 10px;
      font-weight: 700;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 32px;
      line-height: 1.05;
    }

    p {
      margin: 0 0 12px;
      color: var(--muted);
      line-height: 1.55;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
    }

    .button {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 13px 18px;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .button-primary {
      background: var(--accent);
      color: white;
    }

    .button-secondary {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .status {
      margin-top: 14px;
      min-height: 22px;
      font-size: 14px;
      color: var(--muted);
    }

    .token-note {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 18px;
      background: var(--accent-soft);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">Sweater</p>
    <h1 id="headline">Opening Sweater</h1>
    <p id="body-copy">We’re sending you back into the app now.</p>

    <div class="actions">
      <a id="open-app" class="button button-primary" href="sweater://auth-callback">Open Sweater</a>
      <a class="button button-secondary" href="https://apps.apple.com/">Get the app</a>
    </div>

    <p id="status" class="status">If Sweater does not open automatically, tap “Open Sweater”.</p>
    <div class="token-note">
      Open this link on your iPhone with Sweater installed. If you are on desktop, finish this step on your phone instead.
    </div>
  </main>

  <script>
    const headline = document.getElementById("headline");
    const bodyCopy = document.getElementById("body-copy");
    const openAppLink = document.getElementById("open-app");
    const status = document.getElementById("status");

    const currentURL = new URL(window.location.href);
    const fragment = currentURL.hash.startsWith("#") ? currentURL.hash.slice(1) : currentURL.hash;
    const query = currentURL.search.startsWith("?") ? currentURL.search.slice(1) : currentURL.search;
    const params = new URLSearchParams(fragment || query);
    const flowType = (params.get("type") || "").toLowerCase();

    const deepLink = new URL("sweater://auth-callback");
    if (fragment) {
      deepLink.hash = fragment;
    } else if (query) {
      deepLink.search = query;
    }

    if (flowType === "recovery") {
      headline.textContent = "Open Sweater to reset your password";
      bodyCopy.textContent = "Your reset link is ready. Finish choosing your new password inside the app.";
    } else {
      headline.textContent = "Open Sweater to finish signing in";
      bodyCopy.textContent = "Your email is confirmed. Return to the app to complete sign-in safely.";
    }

    openAppLink.href = deepLink.toString();

    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
    if (isIOS) {
      window.setTimeout(() => {
        window.location.replace(deepLink.toString());
      }, 120);
    } else {
      status.textContent = "Open this on your iPhone with Sweater installed, then tap “Open Sweater”.";
    }

    if (history.replaceState) {
      history.replaceState(null, document.title, "/auth/");
    }
  </script>
</body>
</html>
